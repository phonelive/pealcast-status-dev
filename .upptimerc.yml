# PealCast DEV status page + uptime monitor — Upptime (free: GitHub Actions
# monitor the endpoints, Issues are incidents, Pages hosts the site). This is the
# DEV instance: it monitors the dev.pealcast.io surfaces and serves
# status.dev.pealcast.io. The prod instance is the separate repo
# phonelive/pealcast-status (status.pealcast.io). Both CNAME to phonelive.github.io;
# GitHub Pages routes by custom domain. See the pealcast repo:
# docs/2026-07-12-status-page-and-sms-alerts.md.
owner: phonelive
repo: pealcast-status-dev

# Web properties (www / app / player / api) — monitored as HTTP (a real page /
# health check that returns 200).
sites:
  - name: Website
    url: https://dev.pealcast.io
    icon: https://pealcast.io/favicon.svg
  - name: App
    url: https://app.dev.pealcast.io
    icon: https://pealcast.io/favicon.svg
  - name: Player
    url: https://player.dev.pealcast.io
    icon: https://pealcast.io/favicon.svg
  - name: API
    url: https://api.dev.pealcast.io/health
    icon: https://pealcast.io/favicon.svg
  # Live = the streaming INGEST edge (RTMP/SRT), not a web page — check ingest
  # reachable over TCP, not HTTP. RTMP ingest is TCP/1935 → tcp-ping. (SRT is UDP
  # on the same edge, so a TCP check can't add a separate SRT signal.)
  - name: Live (RTMP/SRT ingest)
    url: live.dev.pealcast.io
    check: tcp-ping
    port: 1935
    icon: https://pealcast.io/favicon.svg

status-website:
  theme: light
  cname: status.dev.pealcast.io
  name: System Status (dev)
  favicon: https://pealcast.io/favicon.svg
  logoUrl: https://dev.pealcast.io/pealcast-logo.svg
  # PealCast branding + the "Text STATUS" SMS section + a plain-English legend of
  # what each monitor is. Upptime injects this verbatim into <head>: a <style>
  # that recolors the generated page to the Peal brand (cream/navy/brass, Georgia
  # display type) and a <script> that inserts two on-brand sections (our own
  # classes, so they're immune to Upptime's hashed Svelte classes).
  customHeadHtml: |
    <style>
      :root{color-scheme:light}
      html,body{background:#f7f3ea !important}
      body,main,header,footer,section,.container{color:#14243d !important}
      main.container{max-width:54rem;padding-left:1rem;padding-right:1rem}
      h1,h2,h3{font-family:Georgia,'Iowan Old Style','Times New Roman',serif !important;color:#0f1c30 !important;letter-spacing:-.015em}
      header h1{font-size:2.1rem}
      .lead{color:#4c6285 !important;font-size:1.06rem;line-height:1.65}
      a{color:#b07e2b !important}
      nav .logo{color:#0f1c30 !important;font-weight:700;gap:.55rem}
      nav .logo img{height:34px !important;width:auto !important}
      nav .logo div{font-family:Georgia,'Iowan Old Style','Times New Roman',serif !important;font-weight:600 !important;color:#4c6285 !important;font-size:1.05rem !important;letter-spacing:-.01em}
      nav a{color:#4c6285 !important;font-weight:600}
      nav a[aria-current=page]{color:#b07e2b !important;border-bottom-color:#b07e2b !important}
      footer{color:#6d85a6 !important;border-top:1px solid #e2d8c4;margin-top:2rem}
      section.live-status{background:linear-gradient(160deg,#fbf6ec,#f5e9cf) !important;border:1px solid #e0bc71 !important;border-radius:16px;color:#0f1c30 !important}
      /* status colors -> PealCast: muted green = up, LIVE coral = down (no neon mint) */
      main article.up{border-left-color:#2f8f63 !important;border-top-color:#e2d8c4 !important;border-right-color:#e2d8c4 !important;border-bottom-color:#e2d8c4 !important}
      main article.down,main article.degraded{border-left-color:#f0432a !important}
      /* the summary banner (no per-site graph) -> a polished branded success/alert box */
      main article.up:not(.graph){background:linear-gradient(160deg,#eff7f1,#e4f1e9) !important;border:1px solid #cfe6d8 !important;border-left:4px solid #2f8f63 !important;border-radius:14px !important;padding:1.05rem 1.3rem !important;color:#235c41 !important;box-shadow:0 6px 18px -12px rgba(47,143,99,.5)}
      main article.up:not(.graph) a,main article.up:not(.graph) h4,main article.up:not(.graph) h2,main article.up:not(.graph) h3{color:#235c41 !important;font-weight:600;font-size:1.05rem}
      main article.down:not(.graph){background:linear-gradient(160deg,#fdeeeb,#fbe3de) !important;border:1px solid #f6cabf !important;border-left:4px solid #f0432a !important;border-radius:14px !important;padding:1.05rem 1.3rem !important;color:#9c2a17 !important}
      main article.down:not(.graph) a,main article.down:not(.graph) h4,main article.down:not(.graph) h2,main article.down:not(.graph) h3{color:#9c2a17 !important;font-weight:600}
      /* status + incident badges -> PealCast: green = healthy, coral = incident */
      .tag{border-radius:6px !important;font-weight:600}
      .tag.up,.tag.closed,.tag.resolved,.tag.operational{background:#2f8f63 !important;color:#fff !important}
      .tag.down,.tag.degraded,.tag.open,.tag.hasissues{background:#f0432a !important;color:#fff !important}
      /* response-time graph (canvas) -> shift Upptime's teal line to brand brass */
      main canvas{filter:hue-rotate(-132deg) saturate(.82) brightness(.95)}
      /* per-card explanation line */
      .pc-note{margin:.6rem 0 0;padding-top:.55rem;border-top:1px dashed #ece3d1;font-size:.85rem;color:#4c6285;line-height:1.5}
      /* SMS callout card */
      .pc-card{margin:1.6rem 0;border-radius:18px}
      .pc-sms{padding:1.7rem 1.4rem;text-align:center;color:#f4f0e6;background:linear-gradient(160deg,#14243d 0%,#0c1a2e 100%);box-shadow:0 14px 36px -16px rgba(20,36,61,.55)}
      .pc-sms .pc-badge{display:inline-block;font-size:.7rem;letter-spacing:.09em;text-transform:uppercase;color:#e0bc71;border:1px solid rgba(224,188,113,.45);border-radius:999px;padding:.28rem .75rem;margin-bottom:.75rem}
      .pc-sms h2{color:#fff !important;font-size:1.55rem;margin:.15rem 0 .55rem}
      .pc-sms p{color:#c9d3e2;font-size:1.02rem;line-height:1.6;max-width:35rem;margin:0 auto 1rem}
      .pc-sms b{color:#fff}
      .pc-btn{display:inline-block;background:#c89544;color:#0c1a2e !important;font-weight:700;text-decoration:none;padding:.85rem 1.4rem;border-radius:999px;box-shadow:0 8px 18px -6px rgba(200,149,68,.7);font-size:1.04rem}
      .pc-btn:hover{background:#d4a64f}
      .pc-steps{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;margin-top:1.1rem;font-size:.82rem}
      .pc-steps span{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:.32rem .75rem;color:#aebccf}
      .pc-fine{margin-top:.85rem;font-size:.77rem;color:#8ea0b8}
    </style>
    <script>
    (function(){
      var SMS='<div class="pc-badge">Live status alerts</div>'+
        '<h2>Get a text the moment something changes</h2>'+
        '<p>Text <b>STATUS</b> to <b>(888)&nbsp;868-1618</b> and we&#39;ll text you when a service goes down &mdash; and again when it&#39;s back to normal. No app, no account. Reply <b>STOP</b> anytime.</p>'+
        '<a class="pc-btn" href="sms:+18888681618?&body=STATUS">Text STATUS to (888) 868-1618</a>'+
        '<div class="pc-steps"><span>1 &middot; Text STATUS</span><span>2 &middot; We confirm you&#39;re in</span><span>3 &middot; We text on any incident</span></div>'+
        '<div class="pc-fine">Msg &amp; data rates may apply &middot; US &amp; Canada</div>';
      var NOTES={
        'Website':'Our marketing site (pealcast.io), where churches learn about PealCast.',
        'App':'The church dashboard (app.pealcast.io) — set up channels, go live, and see who watched.',
        'Player':'The watch page (player.pealcast.io) where your congregation streams the service.',
        'API':'The backend (api.pealcast.io) that powers sign-in, streaming, notifications, and stats.',
        'Live':'The streaming edge (RTMP/SRT) your encoder pushes to when you go live.'
      };
      function injectSms(){
        var main=document.querySelector('main.container'); if(!main||document.querySelector('.pc-sms'))return;
        var h=main.querySelector('header');
        var d=document.createElement('div'); d.className='pc-card pc-sms'; d.innerHTML=SMS;
        if(h&&h.parentNode){h.insertAdjacentElement('afterend',d);}else{main.insertBefore(d,main.firstChild);}
      }
      function injectNotes(){
        document.querySelectorAll('main.container article').forEach(function(card){
          if(card.querySelector('.pc-note'))return;
          var nameEl=card.querySelector('a,h4,h3,h2'); if(!nameEl)return;
          var name=nameEl.textContent.trim(), key=null;
          for(var k in NOTES){ if(name.indexOf(k)===0){key=k;break;} }
          if(!key)return;
          var p=document.createElement('p'); p.className='pc-note'; p.textContent=NOTES[key];
          card.appendChild(p);
        });
      }
      function stripStatusEmoji(){document.querySelectorAll('main article.up:not(.graph),main article.down:not(.graph),main article.up:not(.graph) h4,main article.down:not(.graph) h4,main h1,main h2').forEach(function(el){if(el.dataset.pcClean)return;var f=el.firstChild;if(f&&f.nodeType===3){var u=f.nodeValue.replace(/^[\u{1F000}-\u{1FAFF}\u{2600}-\u{27BF}✅❌️\s]+/u,'');if(u!==f.nodeValue){f.nodeValue=u;el.dataset.pcClean='1';}}});}
      function run(){injectSms();injectNotes();stripStatusEmoji();}
      if(document.readyState!=='loading'){run();}else{document.addEventListener('DOMContentLoaded',run);}
      var n=0,t=setInterval(function(){run(); if(++n>20)clearInterval(t);},300);
      var m=document.querySelector('main.container');
      if(m&&window.MutationObserver){new MutationObserver(function(){injectNotes();}).observe(m,{childList:true,subtree:true});}
    })();
    </script>
  introTitle: "PealCast System Status — DEV"
  introMessage: >-
    Live status of the PealCast **development** environment (dev.pealcast.io). This
    is the staging status page; production status is at
    [status.pealcast.io](https://status.pealcast.io).
  navbar:
    - title: Status
      href: /
    - title: Prod status
      href: https://status.pealcast.io/
    - title: App (dev)
      href: https://app.dev.pealcast.io/

workflowSchedule:
  graphs: "0 0 * * *"
  responseTime: "*/30 * * * *"
  staticSite: "*/30 * * * *"
  summary: "*/30 * * * *"
  uptime: "*/5 * * * *"

i18n:
  footer: "© PealCast — a Smart Talk company (dev)"
